name: neuma
description: MemoryLane OS — Your Personal Memory Consciousness
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Audio recording
  record: ^5.1.0
  audioplayers: ^6.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.257.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  permission_handler: ^11.3.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
